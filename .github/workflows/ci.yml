name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]


permissions:
  issues: write
  contents: read
  pull-requests: read
  security-events: write


jobs:

  optimize_ci:
    name: Graphite CI Optimizer
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@main
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_TOKEN }}

  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: optimize_ci
    if: needs.optimize_ci.result != 'failure' && needs.optimize_ci.outputs.skip == 'false'
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'app/**'
              - 'components/**'
              - '.maestro/**'
            supabase:
              - 'supabase/**'

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: optimize_ci
    if: needs.optimize_ci.result != 'failure' && needs.optimize_ci.outputs.skip == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run lint

      - name: Run Type Check
        run: bun run type-check

  runtime_smoke:
    name: Runtime Smoke
    runs-on: ubuntu-latest
    needs: optimize_ci
    if: needs.optimize_ci.result != 'failure' && needs.optimize_ci.outputs.skip == 'false'
    env:
      EXPO_NO_TELEMETRY: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Expo doctor
        run: npx expo-doctor

      - name: Export web bundle
        run: npx expo export --platform web --output-dir ./web-dist

  unit_tests:
    name: Unit & RTL Tests
    runs-on: ubuntu-latest
    needs: optimize_ci
    if: needs.optimize_ci.result != 'failure' && needs.optimize_ci.outputs.skip == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test

  maestro_flows:
    name: Maestro Flows
    runs-on: ubuntu-latest
    needs:
      - optimize_ci
      - detect_changes
    if: >
      needs.optimize_ci.result != 'failure' &&
      needs.optimize_ci.outputs.skip == 'false' &&
      github.event_name == 'pull_request' &&
      needs.detect_changes.outputs.ui == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Assemble Android debug build
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          script: |
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$HOME/.maestro/bin:$PATH"
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/flows --format junit --output /tmp/maestro-report.xml

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: /tmp/maestro-report.xml
          if-no-files-found: ignore

      - name: Upload Maestro workspace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-workspace
          path: ~/.maestro
          if-no-files-found: ignore

  supabase_guardrails:
    name: Supabase Guardrails
    runs-on: ubuntu-latest
    needs:
      - optimize_ci
      - detect_changes
    if: >
      needs.optimize_ci.result != 'failure' &&
      needs.optimize_ci.outputs.skip == 'false' &&
      needs.detect_changes.outputs.supabase == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint Supabase migrations
        run: supabase db lint

  sast_and_secrets:
    name: Semgrep & Gitleaks
    runs-on: ubuntu-latest
    needs: optimize_ci
    if: needs.optimize_ci.result != 'failure' && needs.optimize_ci.outputs.skip == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep CLI
        run: python3 -m pip install --user --upgrade semgrep

      - name: Run Semgrep scan
        run: |
          set +e
          semgrep scan \
            --config p/react-native \
            --config p/owasp-top-ten \
            --sarif --output semgrep.sarif
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" = "7" ]; then
            echo "::warning title=Semgrep findings detected::Review semgrep.sarif or the job log for details."
            exit 0
          elif [ "$EXIT_CODE" != "0" ]; then
            exit "$EXIT_CODE"
          fi

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
      - name: Install Gitleaks CLI
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks

      - name: Determine PR base commit
        id: base_ref
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1
          MERGE_BASE=$(git merge-base ${{ github.event.pull_request.base.sha }} ${{ github.sha }})
          if [ -z "$MERGE_BASE" ]; then
            echo "Merge base missing"
            exit 1
          fi
          echo "sha=${MERGE_BASE}" >> "$GITHUB_OUTPUT"

      - name: Run Gitleaks (push/main)
        if: github.event_name != 'pull_request'
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          set +e
          gitleaks detect --source . --redact --report-format sarif --report-path gitleaks.sarif
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" = "1" ]; then
            echo "::warning title=Gitleaks findings detected::Secrets detected. Review gitleaks.sarif for details."
            exit 0
          elif [ "$EXIT_CODE" != "0" ]; then
            exit "$EXIT_CODE"
          fi

      - name: Run Gitleaks (pull_request diff)
        if: github.event_name == 'pull_request'
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          START_SHA=${{ steps.base_ref.outputs.sha }}
          if [ -z "$START_SHA" ]; then
            echo "Could not determine merge base. Skipping PR diff scan."
            exit 0
          fi
          set +e
          gitleaks detect --source . \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --log-level warn \
            --no-banner \
            --exit-code 2 \
            --log-opts="--no-merges --first-parent ${START_SHA}..${{ github.sha }}"
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" = "1" ]; then
            echo "::warning title=Gitleaks findings detected::Secrets detected. Review gitleaks.sarif for details."
            exit 0
          elif [ "$EXIT_CODE" != "0" ]; then
            exit "$EXIT_CODE"
          fi

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
